# Default evaluation criteria and weights for common vendor categories.
# Use these as a starting point when creating a new evaluation-request.yaml.

defaults:
  saas:
    description: "General SaaS product evaluation"
    criteria:
      - { name: Pricing, weight: 25, description: "Cost per seat, total cost of ownership" }
      - { name: Features, weight: 25, description: "Core feature set completeness" }
      - { name: Ease of Use, weight: 15, description: "UX quality, onboarding, learning curve" }
      - { name: Integrations, weight: 15, description: "API quality, native integrations" }
      - { name: Support, weight: 10, description: "Support quality and documentation" }
      - { name: Security & Compliance, weight: 10, description: "SOC2, GDPR, encryption" }

  infrastructure:
    description: "Infrastructure, cloud, and DevOps tooling evaluation"
    criteria:
      - { name: Performance, weight: 25, description: "Throughput, latency, scalability benchmarks" }
      - { name: Reliability, weight: 20, description: "SLA, uptime history, redundancy options" }
      - { name: Security, weight: 20, description: "Security certifications, compliance, network controls" }
      - { name: Pricing, weight: 15, description: "Consumption pricing, egress costs, reserved pricing" }
      - { name: Support, weight: 10, description: "SLA tiers, TAM availability, support response" }
      - { name: Integrations, weight: 10, description: "Terraform provider, APIs, ecosystem tools" }

  data:
    description: "Data platform, analytics, and BI tool evaluation"
    criteria:
      - { name: Data Connectivity, weight: 25, description: "Connectors, ingestion speed, ETL support" }
      - { name: Query Performance, weight: 20, description: "Query latency, concurrency, caching" }
      - { name: Features, weight: 20, description: "Dashboards, ML integration, data governance" }
      - { name: Pricing, weight: 15, description: "Storage costs, compute costs, per-user fees" }
      - { name: Security & Compliance, weight: 10, description: "Data residency, RBAC, audit logs" }
      - { name: Ease of Use, weight: 10, description: "Self-serve analytics, onboarding, documentation" }

  security:
    description: "Security tooling and SIEM/EDR evaluation"
    criteria:
      - { name: Detection Coverage, weight: 30, description: "Threat detection breadth and accuracy" }
      - { name: Response Capabilities, weight: 20, description: "Automated response, playbooks, SOAR" }
      - { name: Integrations, weight: 20, description: "SIEM integrations, ticketing, API" }
      - { name: Compliance Reporting, weight: 15, description: "Out-of-box compliance reports (SOC2, PCI)" }
      - { name: Pricing, weight: 10, description: "Per-endpoint, per-event, or flat pricing" }
      - { name: Support, weight: 5, description: "SOC support, escalation paths, professional services" }
